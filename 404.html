<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found / ページが見つかりません</title>
  <script>
    (function () {
      const isVersion = (s) => /^v\d+(\.\d+)*(-[a-z]+)?$/i.test(s);
      const segments = location.pathname.split("/").filter(Boolean);
      const vIdx = segments.findIndex(isVersion);
      const isHamuzonGithubIo = location.hostname === "hamuzon.github.io";

      let projectRoot = isHamuzonGithubIo ? "/calendar/" : "/";
      if (vIdx !== -1 && !isHamuzonGithubIo) {
        projectRoot = "/" + segments.slice(0, vIdx).join("/") + "/";
      }
      projectRoot = projectRoot.replace(/\/+/g, "/");

      const base = document.createElement("base");
      base.href = projectRoot;
      document.head.appendChild(base);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="icon-light.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" href="icon-dark.svg" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="404.css" />
  <script src="404.js" defer></script>
</head>
<body>
  <h1>404</h1>
  <p>お探しのページは見つかりませんでした。</p>
  <p class="subtext">Sorry, the page you’re looking for could not be found.</p>
  <a id="backLink" class="back" href="/">トップページへ戻る</a>
</body>
</html>
